<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Reto Vulcano</title>
  <style>
    :root {
      --bg: #fff;
      --ink: #000;
      --accent: #ea3841;
      --radius: 14px;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, "Cascadia Code", Menlo, Monaco, Consolas, monospace;
      --lottie-size: min(176px, 46vw);
      --cta-shadow: 0 8px 24px rgba(234, 56, 65, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 0.65rem 1rem 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.55rem;
      flex: 1;
      justify-content: center;
    }

    .logo-box {
      width: min(26vw, 88px);
      aspect-ratio: 1;
      border-radius: var(--radius);
      background: var(--bg);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .logo-fallback {
      width: 72%;
      height: 72%;
      display: grid;
      place-items: center;
    }
    .logo-fallback svg {
      width: 100%;
      height: auto;
    }

    .lottie-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: var(--lottie-size);
      height: var(--lottie-size);
      margin-inline: auto;
      flex-shrink: 0;
    }

    .hero {
      margin: 0;
      font-size: clamp(1.2rem, 4.8vw, 1.55rem);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: -0.02em;
      max-width: 26ch;
    }

    .status {
      margin: 0;
      font-size: clamp(0.78rem, 2.7vw, 0.95rem);
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .event-meta {
      margin: 0;
      font-size: clamp(0.85rem, 3vw, 1.05rem);
      font-weight: 600;
      line-height: 1.35;
    }
    .event-meta .place {
      display: block;
      margin-top: 0.15rem;
      font-weight: 500;
      font-size: 0.95em;
      opacity: 0.85;
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.45rem;
      width: 100%;
      margin-top: 0.25rem;
    }
    .count-cell {
      border: 2px solid var(--ink);
      border-radius: 12px;
      padding: 0.5rem 0.35rem;
      background: var(--bg);
    }
    .count-cell .num {
      font-family: var(--mono);
      font-size: clamp(1.15rem, 5vw, 1.5rem);
      font-weight: 700;
      line-height: 1.1;
    }
    .count-cell .unit {
      margin-top: 0.2rem;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }
    .count-done {
      margin-top: 0.45rem;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--accent);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 0.35rem;
      padding: 0.55rem 1.4rem;
      width: 100%;
      max-width: 280px;
      border: 2px solid var(--accent);
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--bg);
      background: var(--accent);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: var(--cta-shadow);
    }
    .cta:active { transform: translateY(0); }
    .cta:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 3px;
    }

    .site-foot {
      margin-top: auto;
      padding: 0.5rem 0.65rem 0.65rem;
      flex-shrink: 0;
      text-align: center;
      font-size: 0.68rem;
      opacity: 0.55;
    }

    @media (min-width: 600px) {
      :root { --lottie-size: min(260px, 50vw); }

      .wrap {
        padding: clamp(1rem, 4vw, 2rem) clamp(1rem, 3vw, 1.5rem) 1.5rem;
        gap: clamp(0.75rem, 2vw, 1.25rem);
        justify-content: flex-start;
      }
      .logo-box { width: min(36vw, 140px); }
      .hero { font-size: clamp(1.35rem, 4vw, 2rem); }
      .status { font-size: clamp(0.85rem, 2vw, 1.05rem); }
      .event-meta { font-size: clamp(0.9rem, 2vw, 1.05rem); }

      .count-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 520px;
        gap: 0.65rem;
      }
      .count-cell {
        border-radius: var(--radius);
        padding: 0.75rem 0.45rem;
      }
      .count-cell .num { font-size: clamp(1.25rem, 3vw, 1.85rem); }
      .count-cell .unit {
        margin-top: 0.3rem;
        font-size: 0.65rem;
      }

      .cta {
        min-height: 48px;
        margin-top: 0.5rem;
        padding: 0.85rem 1.5rem;
        font-size: 1rem;
      }
      .site-foot {
        padding: 1rem 1rem 1.25rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo-box">
      <img src="logo.png" alt="Logotipo" width="160" height="160" hidden decoding="async" />
      <div class="logo-fallback" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="8" y="8" width="84" height="84" rx="12" fill="none" stroke="currentColor" stroke-width="4"/>
          <path d="M28 72 L50 28 L72 72 Z" fill="#ea3841"/>
          <circle cx="50" cy="52" r="8" fill="#000"/>
        </svg>
      </div>
    </div>

    <div class="lottie-wrap" id="lottie-root" role="presentation" aria-hidden="true"></div>

    <h1 class="hero">El reto más grande de América</h1>
    <p class="status">Sitio en construcción</p>

    <section class="count-section" aria-labelledby="count-heading">
      <h2 id="count-heading" class="event-meta">
        7 de noviembre de 2026
        <span class="place">Atzitzintla, Puebla</span>
      </h2>
      <div class="count-grid">
        <div class="count-cell">
          <div class="num" id="cd-days">0</div>
          <div class="unit">Días</div>
        </div>
        <div class="count-cell">
          <div class="num" id="cd-hours">0</div>
          <div class="unit">Horas</div>
        </div>
        <div class="count-cell">
          <div class="num" id="cd-mins">0</div>
          <div class="unit">Minutos</div>
        </div>
        <div class="count-cell">
          <div class="num" id="cd-secs">0</div>
          <div class="unit">Segundos</div>
        </div>
      </div>
      <p class="count-done" id="count-done" hidden>Ya comenzó.</p>
    </section>

    <a
      class="cta"
      href="https://carrerasmexico.com/convocatoria.php?event=f63980b7c3565c0620d7a2c5481bbb93&api_key=48513987f33edea8"
      target="_blank"
      rel="noopener noreferrer"
    >Inscríbete</a>
  </main>

  <footer class="site-foot">Desarrollado por CIMA A.C.</footer>

  <script>
(function () {
  "use strict";

  var TARGET_MS = new Date(2026, 10, 7, 0, 0, 0).getTime();
  var LOTTIE_SCRIPT = "https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js";
  var LOTTIE_SRC = "https://lottie.host/66dd07f7-fd3d-44cb-9890-86cf3311906c/F4R5RqpwU5.lottie";

  function pad2(n) {
    return n < 10 ? "0" + n : String(n);
  }

  function initCountdown() {
    var elDays = document.getElementById("cd-days");
    var elHours = document.getElementById("cd-hours");
    var elMins = document.getElementById("cd-mins");
    var elSecs = document.getElementById("cd-secs");
    var elDone = document.getElementById("count-done");
    if (!elDays || !elHours || !elMins || !elSecs || !elDone) return;

    var timerId = setInterval(tick, 1000);
    tick();

    function tick() {
      var ms = TARGET_MS - Date.now();
      if (ms <= 0) {
        elDays.textContent = "0";
        elHours.textContent = "0";
        elMins.textContent = "0";
        elSecs.textContent = "0";
        elDone.hidden = false;
        clearInterval(timerId);
        return;
      }
      elDone.hidden = true;
      var t = Math.floor(ms / 1000);
      elDays.textContent = String(Math.floor(t / 86400));
      elHours.textContent = pad2(Math.floor((t % 86400) / 3600));
      elMins.textContent = pad2(Math.floor((t % 3600) / 60));
      elSecs.textContent = pad2(t % 60);
    }
  }

  function initLogo() {
    var img = document.querySelector(".logo-box img");
    var fb = document.querySelector(".logo-fallback");
    if (!img) return;

    function useImage() {
      img.hidden = false;
      if (fb) fb.hidden = true;
    }
    function useFallback() {
      img.hidden = true;
    }

    img.addEventListener("load", useImage);
    img.addEventListener("error", useFallback);
    if (img.complete && img.naturalWidth > 0) useImage();
  }

  function initLottieLazy() {
    var root = document.getElementById("lottie-root");
    if (!root) return;

    var done = false;
    function mount() {
      var el = document.createElement("dotlottie-wc");
      el.setAttribute("src", LOTTIE_SRC);
      el.setAttribute("autoplay", "");
      el.setAttribute("loop", "");
      el.style.cssText = "display:block;width:100%;height:100%";
      root.appendChild(el);
    }
    function load() {
      if (done) return;
      done = true;
      var s = document.createElement("script");
      s.type = "module";
      s.src = LOTTIE_SCRIPT;
      s.onload = function () {
        if (customElements.whenDefined) {
          customElements.whenDefined("dotlottie-wc").then(mount).catch(mount);
        } else {
          mount();
        }
      };
      s.onerror = function () {
        root.removeAttribute("aria-hidden");
      };
      document.head.appendChild(s);
    }

    function start() {
      if ("IntersectionObserver" in window) {
        var io = new IntersectionObserver(
          function (entries) {
            for (var i = 0; i < entries.length; i++) {
              if (entries[i].isIntersecting) {
                io.disconnect();
                load();
                return;
              }
            }
          },
          { rootMargin: "160px 0px", threshold: 0 }
        );
        io.observe(root);
      } else if (window.requestIdleCallback) {
        requestIdleCallback(load, { timeout: 2500 });
      } else {
        setTimeout(load, 200);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", start);
    } else {
      start();
    }
  }

  initCountdown();
  initLogo();
  initLottieLazy();
})();
  </script>
</body>
</html>
